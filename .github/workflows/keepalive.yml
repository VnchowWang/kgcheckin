name: Keep Alive
# 关键：新增 workflow_dispatch 开启手动运行按钮
on:
  schedule:
    - cron: '0 0 1 * *' # 每月1号自动执行
  workflow_dispatch: # 手动触发开关，加完才会出现Run workflow按钮
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Empty commit to refresh activity
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          git commit --allow-empty -m "Auto keepalive commit"
          git push
